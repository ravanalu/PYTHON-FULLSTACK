<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Types</title>
</head>
<body>
    <form>
        <input type="email" placeholder="Enter email" /><br /><br />
      <input type="password" placeholder="Enter password" /><br /><br />
      <input type="search" placeholder="Search" /><br /><br />
      <label for="d">Enter DOB:</label>
      <input type="date" id="d" />
      <input type="tel" placeholder="Enter phone number" /><br /><br />
      <input type="url" placeholder="Enter URL" /><br /><br />
      <input type="color" placeholder="Enter color" /><br /><br />
      <input type="file" placeholder="Upload file" /><br /><br />
      <input type="range" placeholder="Enter range" /><br /><br />
      <input type="week" placeholder="Enter week" /><br /><br />
      <input type="datetime-local" placeholder="Enter date and time"/><br /><br />
      <input type="month" placeholder="Enter month" /><br /><br />
      <input type="submit" value="Submit" />
    </form>
</body>
</html>
