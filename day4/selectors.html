<html>
  <head>
    <title>selectors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 id="one">Hello world</h1>
    <h1 id="two">Side heading</h1>

    <div class="ai">
      <p>this is ai class</p>
      <ul>
        <li>balaji</li>
        <li>vara lakshmi</li>
        <li>mojesh</li>
      </ul>
    </div>

    <div class="ml">
      <p>this is <span id="something">ml classs</span></p>
      <ul>
        <li>deepthi</li>
        <li>abc</li>
        <li>xyz</li>
      </ul>
    </div>
    <div class="cse">
      <p>this is cse</p>
      <ul>
        <li>varshini</li>
        <li>tiru</li>
        <li>karimulla</li>
      </ul>
    </div>

    <div class="dsit">
      <ul>
        <li>naga lakshmi</li>
        <li id="meenakshi">meenakshi</li>
        <li>subba roa</li>
      </ul>
    </div>
  </body>
</html>
