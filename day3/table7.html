<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><table></table></title>
</head>
<body>
    <table border="3">
        <tr>
            <td colspan="2">Student Registration Form</td>
        </tr>
        <tr>
            <td>Name</td>
            <td><input type="text" name="Name" /></td>
        </tr>
        <tr>
            <td>Age</td>
            <td><input type="num" name="num" /></td>
        </tr>
        <tr>
            <td>email</td>
            <td><input type="text" name="Name" /></td>
        </tr>
        <tr>
            <td>Mobile</td>
            <td><input type="text" name="Name" /></td>
        </tr>
        <tr>
            <td>Gender</td>
            <td><input type="radio" name="gender" value="Male"/>Male
            <input type="radio" name="gender" value="Female"/>Female</td>
        </tr>
        <tr>
            <td>Skills:</td>
            <td><input type="checkbox" name="skill" value="Python" />Python
            <input type="checkbox" name="skill" value="java" />Java</td>
        </tr>
        <tr>
            <td colspan="1" align="center"><input type="submit" /></td>
            <td colspan="1" align="center"><input type="reset" /></td>
        </tr>
    </table>
</body>
</html>
